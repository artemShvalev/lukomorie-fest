<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Фестиваль «Лукоморье» — Магнитогорск</title>

  <!-- Шрифты -->
  <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Roboto:wght@400;700&display=swap"
    rel="stylesheet">

    <script src="config.js"></script>

  <!-- 2GIS API -->
  <script src="https://mapgl.2gis.com/api/js/v1"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1e3b2c;
      font-family: 'Roboto', sans-serif;
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-family: 'Lobster', cursive;
      font-size: clamp(2rem, 6vw, 4rem);
      color: #ffd700;
      text-shadow: 2px 2px 0 #b8860b;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 1.2rem;
      margin-bottom: 30px;
      color: #e0d7b0;
    }

    /* Контейнер сказочной карты */
    .map-wrapper {
      position: relative;
      max-width: 1000px;
      margin: 0 auto 40px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
      background: #2d5a3b;
    }
.festival-map {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 500px;
    background: linear-gradient(135deg, #2d5a3b, #1a3320);
    border-radius: 20px 20px 0 0;
}

    /* Кнопки сцен */
    .stage-btn {
      position: absolute;
      width: 60px;
      height: 60px;
      background: rgba(255, 215, 0, 0.85);
      border: 3px solid #fff;
      border-radius: 50%;
      cursor: pointer;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 15px gold;
      font-weight: bold;
      font-size: 16px;
      color: #1e3b2c;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
      z-index: 10;
      font-family: 'Lobster', cursive;
    }

    .stage-btn:hover {
      background: #ffd700;
      transform: translate(-50%, -50%) scale(1.15);
      box-shadow: 0 0 25px orange;
    }

    /* Модальное окно */
    .modal {
      display: none;
      position: fixed;
      z-index: 100;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      justify-content: center;
      align-items: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: #fff8e7;
      padding: 30px;
      border-radius: 15px;
      max-width: 450px;
      width: 90%;
      position: relative;
      text-align: center;
      border: 5px solid #b8860b;
      color: #3e2723;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .modal-content h2 {
      font-family: 'Lobster', cursive;
      font-size: 2rem;
      margin-bottom: 10px;
      color: #8b4513;
    }

    .modal-content .time {
      font-weight: bold;
      color: #5d4037;
      margin-bottom: 20px;
      display: block;
    }

    .modal-content ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .modal-content li {
      font-size: 1.2rem;
      padding: 8px 0;
      border-bottom: 1px dashed #ccc;
    }

    .close-btn {
      position: absolute;
      right: 15px;
      top: 10px;
      font-size: 28px;
      cursor: pointer;
      color: #8b4513;
      transition: 0.2s;
    }

    .close-btn:hover {
      color: #ff5722;
    }

    /* Блок 2GIS */
    .map-section {
      max-width: 800px;
      margin: 0 auto;
      background: #fff8e7;
      color: #3e2723;
      border-radius: 20px;
      padding: 20px;
    }

    .map-section h2 {
      font-family: 'Lobster', cursive;
      margin-bottom: 15px;
      color: #8b4513;
    }

    #dgismap {
      height: 400px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .map-section p {
      margin-top: 10px;
      font-size: 0.9rem;
    }

    /* Адаптивность */
    @media (max-width: 600px) {
      .stage-btn {
        width: 45px;
        height: 45px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

  <h1>✨ Лукоморье Fest ✨</h1>
  <p class="subtitle">Сказочный фестиваль в Магнитогорске</p>

  <!-- ========== ИНТЕРАКТИВНАЯ СКАЗОЧНАЯ КАРТА ========== -->
<div class="festival-map" id="festivalMapPlaceholder">

  <p style="color: #ffd700; font-size: 2rem; padding-top: 200px; font-family: 'Lobster', cursive;">
    🌳 Карта фестиваля скоро появится 🌳
  </p>

  <div class="stage-btn" style="left: 25%; top: 40%;" data-stage="main">1</div>
  <div class="stage-btn" style="left: 60%; top: 55%;" data-stage="leshy">2</div>
  <div class="stage-btn" style="left: 45%; top: 75%;" data-stage="kikimora">3</div>

</div>

  <!-- МОДАЛЬНОЕ ОКНО -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <span class="close-btn" id="closeModal">&times;</span>
      <h2 id="modalTitle"></h2>
      <span class="time" id="modalTime"></span>
      <ul id="modalList"></ul>
    </div>
  </div>

  <!-- ========== БЛОК «КАК ДОБРАТЬСЯ» НА 2GIS ========== -->
  <div class="map-section">
    <h2>📍 Как найти Лукоморье</h2>
    <div id="dgismap"></div>
    <p>Парк отдыха «Лукоморье», г. Магнитогорск</p>
  </div>

  <script>
    // ======================
    // 1. ДАННЫЕ СЦЕН (РЕДАКТИРУЙ ПОД СЕБЯ)
    // ======================
    const stagesData = {
      main: {
        title: '🏰 Главная сцена',
        time: '12:00 – 22:00',
        artists: [
          'Оркестр «Кот Баюн»',
          'Шоу «33 богатыря»',
          'Василиса Премудрая (DJ set)'
        ]
      },
      leshy: {
        title: '🌳 Шатёр Лешего',
        time: '13:00 – 20:00',
        artists: [
          'Ансамбль «Шишки-Плюшки»',
          'Дуэт «Эхо Леса»',
          'Сказитель Боян'
        ]
      },
      kikimora: {
        title: '💧 Берег Кикиморы',
        time: '14:00 – 21:00',
        artists: [
          'Капелла «Болотные Огни»',
          'Соло на гуслях — Садко',
          'Хор Русалок'
        ]
      }
    };

    // Модальное окно и его элементы
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const modalTime = document.getElementById('modalTime');
    const modalList = document.getElementById('modalList');
    const closeModalBtn = document.getElementById('closeModal');

    // Функция открытия модального окна по ID сцены
    function openStageModal(stageId) {
      const data = stagesData[stageId];
      if (!data) return;

      modalTitle.textContent = data.title;
      modalTime.textContent = '⏰ ' + data.time;
      modalList.innerHTML = data.artists.map(a => `<li>🎤 ${a}</li>`).join('');
      modal.classList.add('active');
    }

    // Закрытие модалки
    function closeModal() {
      modal.classList.remove('active');
    }
    closeModalBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', function (e) {
      if (e.target === modal) closeModal();
    });

    // Навешиваем клики на кнопки сцен (рисованная карта)
    document.querySelectorAll('.stage-btn').forEach(btn => {
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        const stageId = this.dataset.stage;
        openStageModal(stageId);
      });
    });

    // ======================
    // 2. КАРТА 2GIS
    // ======================
    // ⚠️ ВСТАВЬ СВОЙ API-КЛЮЧ НИЖЕ
    const map = new mapgl.Map('dgismap', {
      center: [58.59, 53.24],   // долгота, широта центра парка
      zoom: 16,
      key:  CONFIG.DGIS_API_KEY,       // КЛЮЧ
    });

    // Маркер входа в парк
    const entranceCoords = [59.0328, 53.3835];
    const entranceMarker = new mapgl.Marker(map, {
      coordinates: entranceCoords,
      label: {
        text: 'Вход на фестиваль',
        color: '#8B0000',
        fontSize: 14,
      },
    });

  entranceMarker.on('click', () => {
    const popup = new mapgl.Popup(map, {
      coordinates: entranceCoords,
      html: '<b>Парк «Лукоморье»</b><br>Добро пожаловать на фестиваль!'
    });
  });

    // Сцены на реальной карте (связываем с ID из stagesData)
    const stagesOnRealMap = [
      { coords: [59.0325, 53.384], stageId: 'main', name: 'Главная сцена', color: '#B8860B' },
      { coords: [59.0332, 53.3825], stageId: 'leshy', name: 'Шатёр Лешего', color: '#228B22' },
      { coords: [59.0318, 53.3838], stageId: 'kikimora', name: 'Берег Кикиморы', color: '#4682B4' }
    ];

    // Создаём метки и при клике открываем модальное окно с расписанием
    stagesOnRealMap.forEach(s => {
      const marker = new mapgl.Marker(map, {
        coordinates: s.coords,
        label: { text: s.name, color: s.color, fontSize: 12 },
      });

      marker.on('click', () => {
        openStageModal(s.stageId);
      });
    });
  </script>

</body>

</html>
